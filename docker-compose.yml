services:
  backend:
    build:
      context: ./backend
    environment:
      - API_PREFIX=/api
      - ENV=production
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: /api
    expose:
      - "80"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - frontend
    ports:
      - "8001:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
