server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = /state-doc {
    return 404;
  }

  location = /state-doc/ {
    return 404;
  }

  location = /state-manage {
    return 404;
  }

  location = /state-manage/ {
    return 404;
  }

  location / {
    try_files $uri /index.html;
  }

  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }
}
