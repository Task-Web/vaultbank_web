services:
  vaultbank_web_backend:
    build:
      context: ./backend
    environment:
      - API_PREFIX=/api
      - ENV=production
    expose:
      - "8000"
    networks:
      - web

  vaultbank_web_frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: /api
    expose:
      - "80"
    networks:
      - web
    labels:
      caddy: "${CADDY_SCHEME-http://}vaultbank.${HOST_SUFFIX:-localhost}"
      caddy.0_reverse_proxy: "/api* vaultbank_web_backend:8000"
      caddy.1_reverse_proxy: "/mcp* vaultbank_web_backend:8000"
      caddy.2_reverse_proxy: "vaultbank_web_frontend:80"
